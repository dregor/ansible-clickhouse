---
# tasks file for clickhouse
# Переменные из vars/*.yml (clickhouse_repo*, clickhouse_supported) используются
# только в install/*.yml и remove/*.yml — для config_* они не нужны.
- name: 'Include OS Family Specific Variables'
  include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_os_family | lower }}.yml"
        - 'empty.yml'
      paths:
        - 'vars'
  tags: [install, remove]

- include_tasks: precheck.yml
  tags: [install, remove]

# clickhouse_service_enable/ensure нужны для service.yml, который используется
# всеми ветками (install/config*/remove), поэтому тот же набор тегов.
- include_tasks: params.yml
  tags: [install, config, config_sys, config_db, config_dict, clickhouse_users, remove]

- include_tasks:
    file: "{{ lookup('first_found', params) }}"
    apply:
      tags: [install]
  vars:
    params:
      files:
        - "install/{{ ansible_pkg_mgr }}.yml"
        - 'empty.yml'
  tags: [install]
  when: not clickhouse_remove|bool

- include_tasks: 
    file: configure/sys.yml
    apply:
      tags: [config, config_sys]
  tags: [config, config_sys, clickhouse_users]
  when: not clickhouse_remove|bool

- name: "Notify Handlers Now"
  meta: flush_handlers

- include_tasks: service.yml
  tags: [install, config, config_sys, config_db, config_dict, clickhouse_users, remove]

- name: "Wait for Clickhouse Server to Become Ready"
  wait_for:
    port: "{{ clickhouse_tcp_port }}"
    delay: "{{ clickhouse_ready_delay }}"
  when: not clickhouse_remove|bool

- include_tasks:
    file: configure/db.yml
    apply:
      tags: [config, config_db]
  tags: [config, config_db]
  when: not clickhouse_remove|bool

- include_tasks:
    file: configure/dict.yml
    apply:
      tags: [config, config_dict]
  tags: [config, config_dict]
  when: not clickhouse_remove|bool

- include_tasks:
    file: remove.yml
    apply:
      tags: [remove]
  tags: [remove]
  when: clickhouse_remove|bool